<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>Reset Password | Filmovie</title>
    <link rel="stylesheet" href="../node_modules/modern-normalize/modern-normalize.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap"
    />
    <link rel="icon" type="image.png" href="./images/favicon.png" />

    <script src="./reset-password.ts" type="module" defer></script>
  </head>
  <body class="change-password-page">
    <main class="change-password-page__main">
      <section class="change-password">
        <div class="change-password__container">
          <form class="change-password__form" method="post">
            <label for="change-passwordPassword"
              ><span data-translate="newPassword">New password</span></label
            >
            <input
              id="change-passwordPassword"
              class="change-password__input"
              type="password"
              name="password"
              placeholder="password"
              required
            />

            <label for="change-passwordRepeatPassword">
              <span data-translate="repeatNewPassword">Repeat new password</span>
            </label>
            <input
              id="change-passwordRepeatPassword"
              class="change-password__input"
              type="password"
              name="repeatPassword"
              placeholder="repeat password"
              required
            />

            <button class="change-password__btn" type="submit" data-translate="resetPassword">
              Reset password
            </button>
            <a
              id="change-passwordCancel"
              class="change-password__btn change-password__btn--link"
              href="./index.html"
            >
              Back to home
            </a>
          </form>
          <p class="change-password__success"></p>
          <p class="change-password__error"></p>
        </div>
      </section>
    </main>
  </body>
</html>
