<div class="details backdrop-modal hidden">
  <!-- <div class="details backdrop-modal"> -->
  <div
    class="details__container"
    role="dialog"
    aria-modal="true"
    aria-labelledby="movie-modal-title"
    tabindex="-1"
  >
    <img class="details__img" src="./images/no-video.webp" alt="" />

    <div class="details__information">
      <div class="details__title--wrapper">
        <h2 class="details__title">Title</h2>
        <button id="detailsTrailerButton" class="details__trailer" type="button">
          <svg>
            <use href="#play"></use>
          </svg>
        </button>
      </div>
      <ul class="details__information-list">
        <li class="details__information-list--item">
          <span data-translate="vote"> Vote / Votes </span
          ><span class="details__information-rating details__information-list--data votes"></span>
        </li>
        <li class="details__information-list--item">
          <span data-translate="popularity"> Popularity </span
          ><span class="details__information-list--data popularity"></span>
        </li>
        <li class="details__information-list--item details__information-original-title">
          <span data-translate="orgTitle"> Original Title</span>
          <span class="details__information-list--data title"></span>
        </li>
        <li class="details__information-list--item">
          <span data-translate="genre"> Genre </span>
          <span class="details__information-list--data genre"></span>
        </li>
        <li class="details__information-list--data"><h3 data-translate="about">About</h3></li>
        <li class="details__information-list--item">
          <div class="details__about--container">
            <p class="details__about--p"></p>
          </div>
        </li>
      </ul>
      <div class="details__buttons">
        <button class="btn-add-watched" type="button" data-translate="btnWatched">
          add to watched
        </button>
        <button class="btn-add-queue" type="button" data-translate="btnQueue">add to queue</button>
      </div>
    </div>

    <button id="detailsModalClose" class="details__close-button" type="button">
      <svg width="16" height="16">
        <use href="#close"></use>
      </svg>
    </button>
    <!--  -->
    <div id="trailer" class="trailer hidden">
      <button id="trailerModalClose" class="details__close-button" type="button">
        <svg width="16" height="16">
          <use href="#close"></use>
        </svg>
      </button>
      <iframe
        id="trailerPlayer"
        width="100%"
        height="100%"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen
      ></iframe>
    </div>

    <!--  -->
  </div>
</div>
